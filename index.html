<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>LaTeX Live Preview</title>

    <link rel="stylesheet" href="style.css">

    <script>
        window.MathJax={
            tex:{
                inlineMath:[['$','$'],['\\(','\\)']],
                displayMath:[['$$','$$'],['\\[','\\]']]
            },
            svg:{
                fontCache:'global'
            },
            startup:{
                ready:()=>{
                    MathJax.startup.defaultReady();

                    // MathJaxの読み込み完了後に初回更新
                    update();
                }
            }
        };
    </script>

    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>

<h1>LaTeX Live Preview</h1>

<textarea id="input" placeholder="LaTeXを入力">
</textarea>

<hr>

<div id="preview"></div>

<script src="script.js"></script>

</body>
</html>
